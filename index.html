<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mobile City AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .glass { background: rgba(0, 0, 0, 0.8); backdrop-filter: blur(15px); }
        #chat-window { display: none; transition: all 0.3s ease; }
    </style>
</head>
<body class="bg-gray-100">

    <div id="chat-trigger" onclick="toggleChat()" class="fixed bottom-6 right-6 w-16 h-16 bg-blue-600 rounded-full shadow-2xl flex items-center justify-center cursor-pointer hover:scale-110 transition-all z-50">
        <span class="text-white font-bold">AI</span>
    </div>

    <div id="chat-window" class="fixed bottom-24 right-6 w-[350px] h-[500px] glass rounded-3xl border border-white/20 shadow-2xl flex flex-col z-50">
        <div class="p-4 border-b border-white/10 flex justify-between items-center">
            <div class="flex items-center space-x-2">
                <div class="w-8 h-8 bg-blue-600 rounded-full flex items-center justify-center text-xs font-bold text-white">MC</div>
                <span class="text-white font-bold">Mobile City Support</span>
            </div>
            <button onclick="toggleChat()" class="text-white/50 hover:text-white">✕</button>
        </div>

        <div id="box" class="flex-grow overflow-y-auto p-4 space-y-4 text-sm scrollbar-hide">
            <div class="bg-white/10 text-gray-200 p-3 rounded-2xl rounded-tl-none">Hello! Tap below to ask about S25 Ultra or iPhone 16 prices.</div>
        </div>

        <div class="p-4 border-t border-white/10">
            <div class="flex space-x-2">
                <input id="in" type="text" placeholder="Type message..." class="flex-grow bg-white/5 border border-white/10 rounded-xl px-4 py-2 text-white outline-none focus:border-blue-500">
                <button onclick="send()" class="bg-blue-600 text-white px-4 py-2 rounded-xl font-bold">Send</button>
            </div>
        </div>
    </div>

    <script>
        function toggleChat() {
            const win = document.getElementById('chat-window');
            win.style.display = win.style.display === 'flex' ? 'none' : 'flex';
        }

        async function send() {
            const i = document.getElementById('in');
            const b = document.getElementById('box');
            if(!i.value) return;

            const msg = i.value;
            i.value = '';
            b.innerHTML += `<div class="flex justify-end"><span class="bg-blue-600 text-white p-3 rounded-2xl rounded-tr-none max-w-[80%]">${msg}</span></div>`;
            b.scrollTop = b.scrollHeight;

            try {
                const res = await fetch('/chat', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({message: msg})
                });
                const d = await res.json();
                
                // CRITICAL: We use d.reply to match app.py
                b.innerHTML += `<div class="flex justify-start"><span class="bg-white/10 text-gray-200 p-3 rounded-2xl rounded-tl-none max-w-[80%]">${d.reply}</span></div>`;
                b.scrollTop = b.scrollHeight;
            } catch(e) {
                b.innerHTML += `<div class="text-red-400 text-xs">Connection error. Try again.</div>`;
            }
        }
    </script>
</body>
</html>
